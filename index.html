<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magical Maths</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HOME SCREEN ================= -->
<div id="start" class="screen active">
  <h1 id="title">MAGICAL MATHS</h1>
</div>

<!-- ================= CHAPTERS ================= -->
<div id="chapters" class="screen">
  <div id="chapterList"></div>
</div>

<!-- ================= MODE SCREEN ================= -->
<div id="mode" class="screen">
 <button onclick="startWorksheet()">Worksheet</button>
 <button onclick="backFromMode()">⬅ Back</button>
</div>

<!-- ================= WORKSHEET ================= -->
<div id="worksheet" class="screen">
  
  <div class="top-bar">
    <button onclick="showScreen('chapters')">⬅ Back</button>
    <button onclick="openSolutions()">Solutions</button>
  </div>
  
  <div id="questionsList"></div>

</div>
<!-- ================= SOLUTIONS ================= -->
<div id="solutions" class="screen">
  
  <button onclick="showScreen('worksheet')">⬅ Back</button>
  
  <h2 id="solutionTitle"></h2>

  <h3>Solutions will be added soon</h3>

</div>
<!-- ================= RESULT SCREEN ================= -->
<div id="resultScreen" class="screen">
  <h2 id="score"></h2>
  <h3 id="percentage"></h3>
  <button onclick="goHome()">Home</button>
</div>

<!-- ================= JS ================= -->
<script src="script.js"></script>

</body>
</html>
